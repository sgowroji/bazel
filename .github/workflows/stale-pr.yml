name: Comment on Stale Approved PRs

on:
 workflow_dispatch:
   
jobs:
  comment-on-stale-prs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/github-script@v6

        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const https = require('https');
            const myFetch = https.request;
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const awaitingReviewLabel = "awaiting-review";
            const prs = await github.rest.pulls.list({
              owner,
              repo,
            });

            
            for (const pr of prs.data) {
              const prNumber = pr.number;
              const reviews = (
                await github.rest.pulls.listReviews({
                owner,
                repo,
                pull_number: pr.number,
               })
               ).data;

               
               for (const review of reviews) {
                console.log("Reviewer : ",review.user.login)
                const Url = https://opensource.corp.google.com/github/search.json?q=${review.user.login}
                console.log("Url : ",Url)
                   // Call API request and print the response in console
                  const reviewer = review.user.login; // Example to get reviewer username
                  const apiUrl = `https://opensource.corp.google.com/github/search.json?q=${reviewer}`;
                  console.log("apiUrl : ", apiUrl)

                 https.get(apiUrl, (res) => {
                   let data = '';
                 
                   res.on('data', (chunk) => {
                     data += chunk;
                   });
                 
                   res.on('end', () => {
                     try {
                       const jsonData = JSON.parse(data);
                       console.log(jsonData); // This will contain the response data
                     } catch (error) {
                       console.error("Error parsing JSON:", error);
                     }
                   });
                 }).on('error', (error) => {
                   console.error("Error:", error);
                 });
               }

               
              let approvedReview;
              if (reviews) {
                   approvedReview = reviews.find(review => review.state === "APPROVED");
               } else {
                   console.error("reviews is undefined");
               }
              if (approvedReview && pr.labels.some(label => label.name === awaitingReviewLabel)) {
                const fiveDaysAgo = new Date();
                fiveDaysAgo.setDate(fiveDaysAgo.getDate() - 5);

                if (new Date(approvedReview.submitted_at) < fiveDaysAgo) {
                  console.log('approved pr with awaiting label: ',pr.number)
                  const commentBody = "This PR has been approved for more than 5 days but still has the 'awaiting-review' label. Please review and merge or close the PR.";
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: pr.number,
                    body: commentBody
                  });
                }
              }
            }
