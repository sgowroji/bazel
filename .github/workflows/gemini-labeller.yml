name: Suggest Team Label with Gemini

on:
  issues:
    types: [opened, edited]

jobs:
  suggest_label:
    name: Suggest and Add Team Label
    runs-on: ubuntu-latest # Using ubuntu-latest is generally faster and cheaper unless macOS is required
    permissions:
      issues: write # Need permission to add labels
      contents: read # Needed for checkout
    steps:
      # No yarn cache needed if only using npm

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: '~/.npm' # Path to npm cache directory
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          cache: 'npm' # Use npm caching integrated with setup-node

      - name: Install Google Generative AI dependency
        run: npm i @google/generative-ai

      - name: Generate Label Suggestion using Gemini
        id: scriptgemini
        uses: actions/github-script@v7
        # Removed continue-on-error: true - let it fail if Gemini/script errors occur
        env:
          APIKEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        with:
          script: |
            const { GoogleGenerativeAI } = require("@google/generative-ai");

            // --- Configuration ---
            const modelConfig = {
              model: "gemini-1.5-pro", // Or your desired model
              generationConfig: { temperature: 0 }, // Low temp for deterministic label choice
            };
            const teamLabels = [
              "team-Android", "team-Bazel", "team-Configurability", "team-Core",
              "team-Performance", "team-Local-Exec", "team-Remote-Exec", "team-ExternalDeps",
              "team-Rules-Java", "team-Rules-CPP", "team-Rules-Server", "team-Rules-Python",
              "team-Starlark-Interpreter", "team-Starlark-Integration", "team-Rules-ObjC",
              "team-CLI", "team-Rules-API", "team-Loading-API", "team-OSS", "team-Documentation"
            ]; // Keep your list of valid team labels here
            // --- End Configuration ---

            const genAI = new GoogleGenerativeAI(process.env.APIKEY);
            const model = genAI.getGenerativeModel(modelConfig);

            // Explicitly ask for ONLY ONE label in the specified format
            const prompt = `Analyze the following GitHub issue and choose ONLY ONE team label from the provided list that best describes the issue's domain.

            Available Team Labels:
            \`\`\`
            ${teamLabels.join('\n')}
            \`\`\`

            Issue Details:
            Title: ${process.env.ISSUE_TITLE}
            Body: ${process.env.ISSUE_BODY}

            Respond ONLY with the chosen label in the following format, with no other text:
            LABELS: "the-single-chosen-label"`;

            console.log("Sending prompt to Gemini..."); // Log start
            const result = await model.generateContent(prompt);
            const responseText = result.response.text();
            console.log(`Received response from Gemini: ${responseText}`); // Log response

            // Regex to strictly capture one label inside quotes after "LABELS: "
            const labelRegex = /LABELS:\s*"([^"]+)"/;
            const match = labelRegex.exec(responseText);

            let singleLabel = null;
            if (match && match[1]) {
              const extractedLabel = match[1].trim();
              // Validate against the known list
              if (teamLabels.includes(extractedLabel)) {
                singleLabel = extractedLabel;
                console.log(`Validated single label: ${singleLabel}`);
              } else {
                console.warn(`Gemini returned label "${extractedLabel}" which is not in the allowed list.`);
              }
            } else {
              console.error("Could not extract a single label in the expected format 'LABELS: \"label-name\"' from Gemini response.");
            }

            // Output the single label found, or empty string if none/invalid
            // The next step expects just the label name string directly
            core.setOutput('chosen_label', singleLabel || '');

      - name: Add Single Label to Issue
        # Only run if the previous step produced a non-empty label
        if: steps.scriptgemini.outputs.chosen_label != ''
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }} # Pass token for API calls
          script: |
            const labelToAdd = '${{ steps.scriptgemini.outputs.chosen_label }}'; // Directly get the string output
            console.log(`Attempting to add single label: ${labelToAdd}`);

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: [labelToAdd] // API requires an array, even for one label
            });

            console.log(`Successfully added label: ${labelToAdd}`);
